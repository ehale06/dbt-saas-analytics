version: 2

models:
  - name: mart_daily_active_users
    description: >
      Daily active user counts by plan and industry.
      Used to track engagement trends and product stickiness over time.
    columns:
      - name: event_date
        description: The date of user activity
        tests:
          - not_null
      - name: dau
        description: Count of distinct active users on this date
        tests:
          - not_null
      - name: total_events
        description: Total number of events on this date

  - name: mart_monthly_account_metrics
    description: >
      Monthly rollup of account level engagement metrics.
      Source of truth for MAU, feature usage, and account health per month.
    columns:
      - name: event_month
        description: The month of activity
        tests:
          - not_null
      - name: account_id
        description: Unique account identifier
        tests:
          - not_null
      - name: mau
        description: Monthly active users for this account in this month
      - name: total_events
        description: Total events generated by this account in this month
      - name: unique_features_used
        description: Number of distinct features used by this account in this month

  - name: mart_feature_adoption
    description: >
      Feature level usage metrics per account.
      Used to understand which features drive engagement and identify
      expansion and churn risk signals.
    columns:
      - name: account_id
        description: Unique account identifier
        tests:
          - not_null
      - name: feature_name
        description: The name of the feature
        tests:
          - not_null
      - name: total_uses
        description: Total number of times this feature was used by this account
      - name: unique_users
        description: Number of distinct users who used this feature

  - name: mart_churn_analysis
    description: >
      Account level churn analysis combining subscription status with
      engagement signals. Used to identify at risk accounts and understand
      what distinguishes churned accounts from healthy ones.
    columns:
      - name: account_id
        description: Unique account identifier
        tests:
          - unique
          - not_null
      - name: account_status
        description: Whether the account is active or churned
        tests:
          - accepted_values:
              values: ['active', 'churned']
      - name: health_status
        description: Derived health signal based on recency and engagement
        tests:
          - accepted_values:
              values: ['healthy', 'at_risk', 'low_engagement', 'churned']
      - name: days_as_customer
        description: Number of days from account creation to churn or today